<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusOfuscador | Matrix Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: #050a14;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #0b1120;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h1 { color: #38bdf8; font-size: 28px; margin-bottom: 5px; }
        .subtitle { color: #64748b; font-size: 13px; margin-bottom: 25px; }

        .editor-section { margin-bottom: 20px; text-align: left; }
        .editor-section label { display: block; font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }

        textarea {
            width: 100%; height: 180px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #e2e8f0; padding: 15px; font-size: 13px; resize: none; outline: none;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }

        button {
            width: 100%; border: none; border-radius: 8px; padding: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        #obfuscateBtn { background: #0284c7; color: white; }
        #obfuscateBtn:hover { background: #0369a1; }
        
        #copyBtn { background: #1e293b; color: #38bdf8; border: 1px solid #334155; }
        #copyBtn:hover { background: #334155; }

        #resetBtn { width: 100%; background: transparent; color: #64748b; font-size: 12px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>NexusOfuscador</h1>
        <p class="subtitle">Next-Gen Lua Bytecode Matrix</p>
        
        <div class="editor-section">
            <label>Source Code (Lua)</label>
            <textarea id="luaInput" placeholder="-- Paste clean code here..."></textarea>
        </div>
        
        <div class="btn-group">
            <button id="obfuscateBtn">Ofuscar</button>
            <button id="copyBtn">Copiar</button>
        </div>
        
        <div class="editor-section">
            <label>Output</label>
            <textarea id="luaOutput" readonly placeholder="Result..."></textarea>
        </div>

        <button id="resetBtn">Resetear todo</button>
    </div>

    <script src="script.js"></script>
    <script>
        // Lógica adicional para el botón copiar
        document.getElementById("copyBtn").addEventListener("click", () => {
            const output = document.getElementById("luaOutput");
            if(output.value) {
                navigator.clipboard.writeText(output.value);
                const originalText = document.getElementById("copyBtn").innerText;
                document.getElementById("copyBtn").innerText = "¡Copiado!";
                setTimeout(() => document.getElementById("copyBtn").innerText = originalText, 2000);
            }
        });
    </script>
</body>
</html>
